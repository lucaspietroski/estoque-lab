<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Corretor de Preços de Histórico</title>
  <style>
    :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --text: #f8fafc; --success: #22c55e; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 40px; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .card { background: var(--card); padding: 30px; border-radius: 16px; border: 1px solid #334155; width: 100%; max-width: 500px; text-align: center; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
    h1 { margin-top: 0; color: var(--accent); font-size: 24px; }
    .progress-container { background: #111; height: 12px; border-radius: 6px; margin: 25px 0; overflow: hidden; display: none; }
    .progress-bar { background: var(--accent); height: 100%; width: 0%; transition: width 0.1s; }
    #status { font-size: 14px; color: #94a3b8; margin-bottom: 20px; min-height: 20px; }
    .btn { background: var(--accent); color: white; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; width: 100%; }
    .btn:disabled { background: #334155; cursor: not-allowed; }
    .stats { display: flex; justify-content: space-around; margin-top: 20px; font-size: 13px; color: #94a3b8; }
    .stat-val { display: block; font-size: 18px; color: var(--text); font-weight: bold; margin-top: 5px; }
  </style>
</head>
<body>

  <div class="card">
    <h1>💎 Ajuste de Preços</h1>
    <p>Sincroniza os preços das peças no histórico com os valores atuais do banco de custos.</p>
    
    <div id="setup-area">
      <input type="text" id="email" placeholder="Seu email" style="width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box;">
      <input type="password" id="senha" placeholder="Sua senha" style="width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box;">
      <button class="btn" id="btn-start" onclick="iniciarCorrecao()">Iniciar Sincronização</button>
    </div>

    <div class="progress-container" id="prog-cont">
      <div class="progress-bar" id="prog-bar"></div>
    </div>
    <div id="status">Aguardando login...</div>

    <div class="stats" id="stats-area" style="display:none;">
      <div>Analisados<span class="stat-val" id="stat-total">0</span></div>
      <div>Corrigidos<span class="stat-val" id="stat-fixed" style="color: var(--success)">0</span></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const supabaseUrl = 'https://idpmrjjalhnpsxpfugph.supabase.co';
    const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlkcG1yamphbGhucHN4cGZ1Z3BoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NjU2NjcsImV4cCI6MjA5MzI0MTY2N30.L4hV7YM9yjdOOW9zBl84L-1si2DU8nBI3J1WgmW02lY';
    const supabase = createClient(supabaseUrl, supabaseAnonKey);

    async function iniciarCorrecao() {
      const email = document.getElementById('email').value;
      const senha = document.getElementById('senha').value;
      const btn = document.getElementById('btn-start');
      const status = document.getElementById('status');

      status.innerText = "Autenticando...";
      const { data: auth, error: authErr } = await supabase.auth.signInWithPassword({ email, password: senha });
      if (authErr) { status.innerText = "❌ Erro: " + authErr.message; return; }

      btn.disabled = true;
      document.getElementById('setup-area').style.display = 'none';
      document.getElementById('prog-cont').style.display = 'block';
      document.getElementById('stats-area').style.display = 'flex';

      status.innerText = "Carregando tabela de custos...";
      const { data: custos } = await supabase.from('custos').select('code, last_cost');
      const precoMap = {};
      custos.forEach(c => { precoMap[c.code] = c.last_cost; });

      status.innerText = "Buscando histórico para corrigir...";
      const { data: historico } = await supabase.from('historico')
        .select('id, code, qty, vlr_unit, vlr_total');
      
      const total = historico.length;
      document.getElementById('stat-total').innerText = total;
      
      let fixed = 0;
      const progressBar = document.getElementById('prog-bar');

      // Processar em chunks para ser rápido mas não travar
      const chunkSize = 20;
      for (let i = 0; i < total; i += chunkSize) {
          const chunk = historico.slice(i, i + chunkSize);
          const promises = chunk.map(async (item) => {
              const precoAtual = precoMap[item.code];
              if (precoAtual && precoAtual > 0) {
                  const novoVlrUnit = precoAtual;
                  const novoVlrTotal = precoAtual * item.qty;

                  if (item.vlr_unit !== novoVlrUnit || item.vlr_total !== novoVlrTotal) {
                      const { error } = await supabase.from('historico')
                          .update({ vlr_unit: novoVlrUnit, vlr_total: novoVlrTotal })
                          .eq('id', item.id);
                      if (!error) fixed++;
                  }
              }
          });

          await Promise.all(promises);
          
          const pct = Math.min(100, Math.round(((i + chunk.length) / total) * 100));
          progressBar.style.width = pct + '%';
          status.innerText = `Processando: ${i + chunk.length} de ${total}`;
          document.getElementById('stat-fixed').innerText = fixed;
      }

      status.innerText = "✅ Sincronização concluída!";
      progressBar.style.background = "var(--success)";
    }

    window.iniciarCorrecao = iniciarCorrecao;
  </script>
</body>
</html>
