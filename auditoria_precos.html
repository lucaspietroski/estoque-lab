<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Auditoria de Preços Nativos</title>
  <style>
    :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --text: #f8fafc; --danger: #ef4444; --warning: #f59e0b; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 40px; margin: 0; }
    .container { max-width: 1000px; margin: auto; }
    h1 { color: var(--accent); }
    .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #334155; margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; background: var(--card); border-radius: 12px; overflow: hidden; }
    th { background: #334155; padding: 12px; text-align: left; }
    td { padding: 12px; border-bottom: 1px solid #334155; }
    .diff { color: var(--danger); font-weight: bold; }
    .btn { background: var(--accent); color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    #log { background: #000; padding: 15px; font-family: monospace; height: 120px; overflow-y: auto; margin-bottom: 20px; border-radius: 8px; font-size: 12px; }
  </style>
</head>
<body>

  <div class="container">
    <h1>💰 Auditoria de Preços Nativos</h1>
    <p>Comparando o <b>Custo Base</b> entre Firebase e Supabase.</p>

    <div class="card">
      <input type="text" id="email" placeholder="Email Admin" style="padding: 10px; background: #0f172a; color: white; border: 1px solid #444; border-radius: 4px;">
      <input type="password" id="senha" placeholder="Senha" style="padding: 10px; background: #0f172a; color: white; border: 1px solid #444; border-radius: 4px;">
      <button class="btn" onclick="iniciarAuditoria()">Comparar Preços</button>
      <button id="btn-fix" class="btn" style="background: #22c55e; display:none;" onclick="corrigirPrecos()">🔨 Corrigir Tudo (Forçar FB)</button>
    </div>

    <div id="log">Aguardando...</div>

    <div id="results-area" style="display:none;">
      <table>
        <thead>
          <tr>
            <th>Código</th>
            <th>Firebase (Nativo)</th>
            <th>Supabase (Atual)</th>
            <th>Diferença</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const firebaseConfig = {
      apiKey: "AIzaSyAjxhYEf5z_BG_ciqPQUuqW8ar1VKrjJfk",
      authDomain: "estoque-laboratorio.firebaseapp.com",
      projectId: "estoque-laboratorio"
    };

    const supabaseUrl = 'https://idpmrjjalhnpsxpfugph.supabase.co';
    const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlkcG1yamphbGhucHN4cGZ1Z3BoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NjU2NjcsImV4cCI6MjA5MzI0MTY2N30.L4hV7YM9yjdOOW9zBl84L-1si2DU8nBI3J1WgmW02lY';

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const supabase = createClient(supabaseUrl, supabaseAnonKey);

    const logEl = document.getElementById('log');
    function appendLog(text) { logEl.textContent += text + '\n'; logEl.scrollTop = logEl.scrollHeight; }

    window.priceDiffs = [];

    async function iniciarAuditoria() {
      const email = document.getElementById('email').value;
      const senha = document.getElementById('senha').value;
      
      appendLog('Autenticando...');
      const { error: authErr } = await supabase.auth.signInWithPassword({ email, password: senha });
      if (authErr) { appendLog('Erro: ' + authErr.message); return; }

      appendLog('📥 Coletando custos do Firebase...');
      const fbSnap = await getDocs(collection(db, "custos"));
      let fbPrices = {};
      fbSnap.forEach(d => {
          fbPrices[d.id] = parseFloat(d.data().lastCost) || 0;
      });

      appendLog('📥 Coletando custos do Supabase...');
      const { data: supaPrices, error: errS } = await supabase.from('custos').select('*');
      
      let supaPriceMap = {};
      supaPrices.forEach(r => supaPriceMap[r.code] = r.last_cost);

      const tbody = document.getElementById('table-body');
      tbody.innerHTML = '';
      window.priceDiffs = [];
      
      const allCodes = new Set([...Object.keys(fbPrices), ...Object.keys(supaPriceMap)]);

      allCodes.forEach(code => {
          const fb = fbPrices[code] || 0;
          const supa = supaPriceMap[code] || 0;

          if (Math.abs(fb - supa) > 0.01) {
              window.priceDiffs.push({ code, last_cost: fb });
              const tr = document.createElement('tr');
              tr.innerHTML = `
                <td>${code}</td>
                <td>R$ ${fb.toLocaleString('pt-BR', {minimumFractionDigits:2})}</td>
                <td>R$ ${supa.toLocaleString('pt-BR', {minimumFractionDigits:2})}</td>
                <td class="diff">R$ ${(supa - fb).toLocaleString('pt-BR', {minimumFractionDigits:2})}</td>
              `;
              tbody.appendChild(tr);
          }
      });

      appendLog(`✅ Auditoria concluída. Divergências: ${window.priceDiffs.length}`);
      document.getElementById('results-area').style.display = 'block';
      if (window.priceDiffs.length > 0) document.getElementById('btn-fix').style.display = 'inline-block';
    }

    async function corrigirPrecos() {
        if (!confirm(`Deseja forçar o preço nativo do Firebase em ${window.priceDiffs.length} itens?`)) return;
        appendLog('Corrigindo...');
        const { error } = await supabase.from('custos').upsert(window.priceDiffs, { onConflict: 'code' });
        if (error) appendLog('Erro: ' + error.message);
        else {
            appendLog('✅ Preços sincronizados!');
            iniciarAuditoria();
        }
    }

    window.iniciarAuditoria = iniciarAuditoria;
    window.corrigirPrecos = corrigirPrecos;
  </script>
</body>
</html>
